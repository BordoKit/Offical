<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordokit - Bakım Modu</title>
    <style>
        /* --- Temel Ayarlar ve Reset --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d0f14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: #ffffff;
            padding: 20px;
        }

        /* --- Arka Plan Işık Efektleri (Glow) --- */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.4;
            animation: pulse 8s infinite alternate;
        }

        body::before {
            background: #00d2ff; /* Mavi tonu */
            top: 20%;
            left: 20%;
        }

        body::after {
            background: #9d4edd; /* Mor tonu */
            bottom: 20%;
            right: 20%;
            animation-delay: 4s;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.2); opacity: 0.5; }
        }

        /* --- Ana Kart (Glassmorphism) --- */
        .maintenance-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 580px;
            text-align: center;
            z-index: 1;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Modern Kalkan İkonu (CSS) --- */
        .icon-container {
            margin-bottom: 25px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .shield-icon {
            width: 70px;
            height: 75px;
            background: linear-gradient(135deg, #00d2ff, #9d4edd);
            clip-path: polygon(50% 0%, 100% 20%, 100% 70%, 50% 100%, 0% 70%, 0% 20%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.4);
            animation: float 4s ease-in-out infinite;
        }

        /* Kalkanın içindeki tik işareti */
        .shield-icon::after {
            content: '';
            width: 15px;
            height: 30px;
            border: solid #0d0f14;
            border-width: 0 5px 5px 0;
            transform: rotate(45deg);
            margin-top: -5px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- Metin Tasarımları --- */
        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ffffff 40%, #a2a8d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .announcement {
            font-size: 1.15rem;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 15px;
            font-weight: 300;
        }

        .team-name {
            font-size: 1rem;
            color: #00d2ff;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 35px;
            opacity: 0.9;
        }

        /* --- Seperatör Hattı --- */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin-bottom: 35px;
        }

        /* --- Canlı Geri Sayım Sayacı --- */
        .countdown-container {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 40px;
        }

        .countdown-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 15px 10px;
            border-radius: 14px;
            position: relative;
            transition: transform 0.3s ease;
        }

        .countdown-box:hover {
            transform: translateY(-3px);
            border-color: rgba(0, 210, 255, 0.2);
        }

        .countdown-value {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            display: block;
            font-variant-numeric: tabular-nums;
        }

        .countdown-label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            display: block;
        }

        /* --- Alt Bilgi Mesajı --- */
        .footer-message {
            font-size: 0.85rem;
            color: #64748b;
            letter-spacing: 0.5px;
            font-style: italic;
        }

        /* --- Mobil Uyumluluk (Responsive) --- */
        @media (max-width: 480px) {
            .maintenance-card {
                padding: 40px 20px;
            }

            h1 {
                font-size: 2.4rem;
            }

            .announcement {
                font-size: 1rem;
            }

            .countdown-container {
                gap: 8px;
            }

            .countdown-box {
                padding: 10px 5px;
            }

            .countdown-value {
                font-size: 1.4rem;
            }

            .countdown-label {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>

    <div class="maintenance-card">
        <div class="icon-container">
            <div class="shield-icon"></div>
        </div>

        <h1>Bordokit</h1>

        <p class="announcement">Bordokit sitemiz güvenlik güncellemeleri nedeniyle 27 Haziran Cumartesi günü tekrar açılacaktır.</p>
        <p class="team-name">BordoDev Ekibi</p>

        <div class="divider"></div>

        <div class="countdown-container">
            <div class="countdown-box">
                <span class="countdown-value" id="days">00</span>
                <span class="countdown-label">Gün</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-value" id="hours">00</span>
                <span class="countdown-label">Saat</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-value" id="minutes">00</span>
                <span class="countdown-label">Dakika</span>
            </div>
            <div class="countdown-box">
                <span class="countdown-value" id="seconds">00</span>
                <span class="countdown-label">Saniye</span>
            </div>
        </div>

        <p class="footer-message">Güvenliğiniz için çalışıyoruz...</p>
    </div>

    <script>
        // Hedef tarih: 27 Haziran Cumartesi (Gece yarısı 00:00 başlangıcı varsayılmıştır)
        // Eğer gün ortasında açılacaksa "June 27, 2026 12:00:00" gibi saat ekleyebilirsin.
        const targetYear = new Date().getFullYear(); 
        // Eğer Haziran ayı çoktan geçildiyse bir sonraki yılın haziranını hedefler, stabilite için dinamik ayarlandı.
        let targetDate = new Date(`June 27, ${targetYear} 00:00:00`).getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            // Zaman birimlerinin hesaplanması
            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            // Çift haneli görünüm (Örn: 05 yerine 5 olmaması için)
            const formatTime = (time) => time < 10 ? `0${time}` : time;

            if (difference > 0) {
                document.getElementById('days').innerText = formatTime(d);
                document.getElementById('hours').innerText = formatTime(h);
                document.getElementById('minutes').innerText = formatTime(m);
                document.getElementById('seconds').innerText = formatTime(s);
            } else {
                // Süre dolduğunda sıfırla veya alternatif mesaj göster
                document.getElementById('days').innerText = "00";
                document.getElementById('hours').innerText = "00";
                document.getElementById('minutes').innerText = "00";
                document.getElementById('seconds').innerText = "00";
                clearInterval(countdownInterval);
            }
        }

        // İlk yüklemede çalıştır ve her saniye güncelle
        updateCountdown();
        const countdownInterval = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
