<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BORDOKİT | Yenileniyor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff2bd6;
            --deep-red: #ff3b3b;
            --bg-black: #030303;
            --text-white: #f0f0f0;
            --text-gray: #b0b0b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Poppins', sans-serif;
            background: var(--bg-black);
            color: var(--text-white);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Sinematik Background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 30% 40%, rgba(255, 43, 214, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(255, 59, 59, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, #080808 0%, #000000 100%);
            z-index: 0;
            animation: bgPulse 6s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }

        /* Grain Overlay */
        .noise-overlay {
            position: fixed;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.035'/%3E%3C/svg%3E");
            z-index: 1;
            pointer-events: none;
            animation: noiseMove 0.4s steps(5) infinite;
        }

        @keyframes noiseMove {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-4%, -4%); }
            50% { transform: translate(-8%, 4%); }
            75% { transform: translate(4%, -8%); }
            100% { transform: translate(0, 0); }
        }

        /* Particles */
        #particleCanvas {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* Main Container */
        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            animation: containerFloat 5s ease-in-out infinite;
        }

        @keyframes containerFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* Glass Panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 28px;
            padding: 3.5rem 3rem;
            box-shadow: 
                0 0 100px rgba(255, 43, 214, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            position: relative;
            overflow: hidden;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            inset: -1px;
            background: linear-gradient(45deg, transparent, rgba(255, 43, 214, 0.08), transparent);
            border-radius: 28px;
            z-index: -1;
            opacity: 0;
            animation: borderGlow 3s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* Title */
        .title {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            letter-spacing: 0.12em;
            color: var(--neon-pink);
            text-shadow: 
                0 0 10px rgba(255, 43, 214, 0.6),
                0 0 40px rgba(255, 43, 214, 0.3),
                0 0 80px rgba(255, 43, 214, 0.15);
            margin-bottom: 2rem;
            animation: titleFlicker 2.5s infinite alternate, fadeInUp 0.6s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes titleFlicker {
            0%, 19%, 21%, 23%, 54%, 56%, 100% {
                text-shadow: 
                    0 0 10px rgba(255, 43, 214, 0.6),
                    0 0 40px rgba(255, 43, 214, 0.3),
                    0 0 80px rgba(255, 43, 214, 0.15);
                opacity: 1;
            }
            20%, 22%, 55% {
                text-shadow: 0 0 5px rgba(255, 43, 214, 0.3);
                opacity: 0.85;
            }
        }

        /* Divider */
        .divider {
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
            margin: 0 auto 2rem;
            animation: expandWidth 0.6s ease-out 0.3s forwards;
            transform: scaleX(0);
            opacity: 0.7;
        }

        @keyframes expandWidth {
            to { transform: scaleX(1); }
        }

        /* Message */
        .message {
            font-family: 'Inter', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            font-weight: 300;
            line-height: 2;
            color: var(--text-gray);
            letter-spacing: 0.02em;
        }

        .message .line {
            display: block;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInUp 0.5s ease-out forwards;
        }

        .message .line:nth-child(1) { animation-delay: 0.5s; }
        .message .line:nth-child(2) { animation-delay: 0.8s; }
        .message .line:nth-child(3) { animation-delay: 1.1s; }

        .highlight-date {
            color: var(--neon-pink);
            font-weight: 600;
            text-shadow: 0 0 20px rgba(255, 43, 214, 0.4);
        }

        /* Loading Dots */
        .loading-dots {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 6px;
            opacity: 0;
            animation: fadeIn 0.4s ease-out 1.4s forwards;
        }

        .dot {
            width: 5px;
            height: 5px;
            background: var(--neon-pink);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-pink);
            animation: dotPulse 1.2s ease-in-out infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.15s; }
        .dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.4); opacity: 1; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Bottom Right */
        .bottom-text {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--deep-red);
            text-shadow: 
                0 0 10px rgba(255, 59, 59, 0.5),
                0 0 25px rgba(255, 59, 59, 0.2);
            z-index: 10;
            animation: bottomGlow 2s ease-in-out infinite, fadeIn 0.6s ease-out 1.6s forwards;
            opacity: 0;
            letter-spacing: 0.04em;
        }

        @keyframes bottomGlow {
            0%, 100% { opacity: 0.85; }
            50% { opacity: 1; text-shadow: 0 0 15px rgba(255, 59, 59, 0.8), 0 0 35px rgba(255, 59, 59, 0.4); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .glass-panel { padding: 2.5rem 1.5rem; margin: 1rem; }
            .main-container { padding: 1rem; }
            .bottom-text { font-size: 0.75rem; bottom: 1rem; right: 1rem; }
            .message { line-height: 1.8; }
        }

        @media (max-width: 480px) {
            .glass-panel { padding: 2rem 1.25rem; }
            .bottom-text { font-size: 0.7rem; }
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <div class="noise-overlay"></div>
    <canvas id="particleCanvas"></canvas>

    <div class="main-container">
        <div class="glass-panel">
            <h1 class="title">BORDOKİT</h1>
            <div class="divider"></div>
            
            <div class="message">
                <span class="line">Sitemiz şuan titizlikle yenileniyor..</span>
                <span class="line">Yeni sunucular bağlıyoruz, yeni güncellemeler ekliyoruz.</span>
                <span class="line"><span class="highlight-date">21 Haziran</span> akşamı tekrar açılacaktır.</span>
            </div>

            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <div class="bottom-text">İyi çalışmalar cerrah 🫀💐..</div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 40;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.25;
                this.speedY = (Math.random() - 0.5) * 0.25;
                this.opacity = Math.random() * 0.4 + 0.1;
                this.color = Math.random() > 0.5 ? '255, 43, 214' : '255, 59, 59';
                this.life = 0;
                this.maxLife = Math.random() * 150 + 80;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life++;
                if (this.life >= this.maxLife || this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            draw() {
                const lifeRatio = 1 - (this.life / this.maxLife);
                const currentOpacity = this.opacity * lifeRatio;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${currentOpacity})`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${currentOpacity * 0.15})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) particles.push(new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        /* Subtle mouse parallax */
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 8;
            const y = (e.clientY / window.innerHeight - 0.5) * 8;
            document.querySelector('.glass-panel').style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
